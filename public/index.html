<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voting App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Voting App</h2>

    <!-- Signup Form -->
    <div id="signup-section">
        <h3>Signup</h3>
        <form id="signupForm">
            <input type="text" id="name" placeholder="Enter Your Name" required>
            <input type="number" id="age" placeholder="Enter Your Age" required>
            <input type="email" id="email" placeholder="Enter Your Email" required>
            <input type="number" id="mobile" placeholder="Enter Your Mobile Number" required>
            <input type="text" id="address" placeholder="Enter Your Address" required>
            <input type="number" id="aadharCardNumber" placeholder="Enter Your Aadhar Card Number" required>
            <input type="password" id="password" placeholder="Enter Your Password" required>
            <select id="role">
                <option value="voter">Voter</option>
                <!-- <option value="admin">Admin</option> -->
            </select>
            <button type="submit">Signup</button>
            <button id="goToLogin">Login</button>

        </form>
        <p id="signup-message"></p>
    </div>

    
    <!-- Voting Section -->
    <div id="vote-section" style="display:none;">
        <h3>Vote for a Candidate</h3>
        <ul id="candidate-list"></ul>
        <button id="voteBtn" style="background: linear-gradient(45deg, #667eea, #764ba2);" >Submit Vote</button>
        <p id="vote-msg"></p>
        <h3>Results</h3>
        <ul id="results-list"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
